server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api

spring:
  application:
    name: knowledge-base-platform
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Qdrant
qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_GRPC_PORT:6334}
  api-key: ${QDRANT_API_KEY:}
  collections:
    confluence: confluence_docs
    incidents: incident_resolutions
    runbooks: runbooks

# OpenAI (GPT-5.1)
openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-5.1
  embedding-model: text-embedding-3-large
  embedding-dimensions: 3072
  max-tokens: 2048
  temperature: 0.3

# Confluence
confluence:
  base-url: ${CONFLUENCE_BASE_URL:https://your-domain.atlassian.net/wiki}
  username: ${CONFLUENCE_USERNAME:}
  api-token: ${CONFLUENCE_API_TOKEN:}
  spaces: ${CONFLUENCE_SPACES:DEVOPS,SRE,RUNBOOK}
  sync-cron: "0 0 */4 * * *"  # every 4 hours

# RAG
rag:
  chunk-size: 1000
  chunk-overlap: 200
  top-k: 5
  score-threshold: 0.75
  cache-ttl-minutes: 60

# AWS DynamoDB
aws:
  dynamodb:
    region: ${AWS_REGION:us-east-1}
    endpoint: ${DYNAMODB_ENDPOINT:}  # leave empty for real AWS, set for local
    table-name: ${DYNAMODB_TABLE:kb_alert_insights}

# n8n webhook (for pushing results back)
n8n:
  webhook-url: ${N8N_WEBHOOK_URL:http://localhost:5678/webhook}

logging:
  level:
    com.devops.kb: DEBUG
